<style>
        .animate-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-slow {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .7;
            }
        }

        .animate-progress {
            animation: progress 2.5s ease-in-out infinite;
            transform-origin: left;
        }

        @keyframes progress {
            0% {
                transform: scaleX(0);
            }
            50% {
                transform: scaleX(0.7);
            }
            100% {
                transform: scaleX(1);
            }
        }

        .bg-texture {
            background-image: radial-gradient(circle at center, rgba(114, 47, 55, 0.03) 0%, transparent 70%);
        }
    </style>
