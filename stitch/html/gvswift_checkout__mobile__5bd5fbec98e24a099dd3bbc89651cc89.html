<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* Custom Input Styling */
        .gv-input {
            transition: all 0.3s ease;
        }
        .gv-input:focus-within {
            border-color: #722f37;
            border-width: 2px;
        }
        .gv-input:focus-within label {
            color: #722f37;
        }
        
        /* Pulse Animation for Checkout Button */
        @keyframes pulse-subtle {
            0% { box-shadow: 0 0 0 0 rgba(114, 47, 55, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(114, 47, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(114, 47, 55, 0); }
        }
        .btn-pulse {
            animation: pulse-subtle 2s infinite;
        }
        
        /* Step Transitions */
        .step-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .step-content.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md text-body-md antialiased md:hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant flex justify-between items-center px-margin-mobile h-16 transition-colors duration-300">
<button aria-label="Go back" class="text-primary hover:opacity-80 transition-opacity p-2 -ml-2 rounded-full focus:outline-none focus:ring-2 focus:ring-primary-container">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="text-headline-md font-headline-md uppercase tracking-widest text-primary truncate">GVSWIFT</h1>
<button aria-label="Shopping bag" class="text-primary hover:opacity-80 transition-opacity p-2 -mr-2 rounded-full focus:outline-none focus:ring-2 focus:ring-primary-container">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</header>
<main class="pt-20 pb-32 px-margin-mobile min-h-screen">
<!-- Progress Indicator -->
<div class="flex justify-between items-center mb-8 relative">
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-outline-variant -z-10"></div>
<div class="flex flex-col items-center bg-background px-2">
<div class="w-6 h-6 rounded-full bg-primary text-on-primary flex items-center justify-center text-caption font-caption mb-1 shadow-sm">1</div>
<span class="text-caption font-caption text-primary">Shipping</span>
</div>
<div class="flex flex-col items-center bg-background px-2">
<div class="w-6 h-6 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center text-caption font-caption mb-1">2</div>
<span class="text-caption font-caption text-on-surface-variant">Payment</span>
</div>
<div class="flex flex-col items-center bg-background px-2">
<div class="w-6 h-6 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center text-caption font-caption mb-1">3</div>
<span class="text-caption font-caption text-on-surface-variant">Review</span>
</div>
</div>
<!-- Section 1: Shipping Information -->
<section class="step-content active space-y-6" id="step-shipping">
<div class="space-y-2">
<h2 class="text-headline-sm font-headline-sm text-primary border-b border-outline-variant pb-2">Shipping Information</h2>
<p class="text-caption font-caption text-on-surface-variant">Please provide your delivery details.</p>
</div>
<form class="space-y-4">
<div class="gv-input border border-outline rounded-xl p-3 bg-surface-container-lowest">
<label class="block text-caption font-caption text-on-surface-variant mb-1 transition-colors">Full Name</label>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md font-body-md text-on-surface placeholder:text-outline" placeholder="Eleanor Vance" type="text"/>
</div>
<div class="gv-input border border-outline rounded-xl p-3 bg-surface-container-lowest">
<label class="block text-caption font-caption text-on-surface-variant mb-1 transition-colors">Email Address</label>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md font-body-md text-on-surface placeholder:text-outline" placeholder="eleanor@example.com" type="email"/>
</div>
<div class="gv-input border border-outline rounded-xl p-3 bg-surface-container-lowest">
<label class="block text-caption font-caption text-on-surface-variant mb-1 transition-colors">Street Address</label>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md font-body-md text-on-surface placeholder:text-outline" placeholder="123 Heritage Lane" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="gv-input border border-outline rounded-xl p-3 bg-surface-container-lowest">
<label class="block text-caption font-caption text-on-surface-variant mb-1 transition-colors">City</label>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md font-body-md text-on-surface placeholder:text-outline" placeholder="London" type="text"/>
</div>
<div class="gv-input border border-outline rounded-xl p-3 bg-surface-container-lowest">
<label class="block text-caption font-caption text-on-surface-variant mb-1 transition-colors">Postal Code</label>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md font-body-md text-on-surface placeholder:text-outline" placeholder="W1B 3AG" type="text"/>
</div>
</div>
</form>
<button class="w-full py-4 bg-primary text-on-primary rounded-full text-label-md font-label-md uppercase tracking-wider hover:bg-surface-tint transition-colors mt-8">
                Continue to Payment
            </button>
</section>
<!-- Section 2: Payment Method (Simplified for visual flow) -->
<section class="step-content hidden space-y-6" id="step-payment">
<div class="space-y-2">
<h2 class="text-headline-sm font-headline-sm text-primary border-b border-outline-variant pb-2">Payment Method</h2>
</div>
<div class="space-y-3">
<label class="flex items-center justify-between p-4 border border-outline-variant rounded-xl bg-surface cursor-pointer hover:bg-surface-container-low transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">credit_card</span>
<span class="text-body-md font-body-md text-on-surface">Credit Card</span>
</div>
<input class="text-primary focus:ring-primary border-outline" disabled="" name="payment" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 border-2 border-primary rounded-xl bg-surface-container-lowest cursor-pointer relative overflow-hidden">
<div class="absolute inset-0 bg-primary-container opacity-5"></div>
<div class="flex items-center gap-3 relative z-10">
<span class="material-symbols-outlined text-primary fill">payments</span>
<div class="flex flex-col">
<span class="text-body-md font-body-md text-on-surface font-semibold">Cash on Delivery</span>
<span class="text-caption font-caption text-on-surface-variant">Pay when you receive the order</span>
</div>
</div>
<input checked="" class="text-primary focus:ring-primary border-outline relative z-10" name="payment" type="radio"/>
</label>
</div>
</section>
<!-- Section 3: Order Summary -->
<section class="step-content hidden mt-12 space-y-6" id="step-review">
<div class="space-y-2">
<h2 class="text-headline-sm font-headline-sm text-primary border-b border-outline-variant pb-2">Order Summary</h2>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex gap-4">
<div class="w-24 h-32 rounded-lg overflow-hidden shrink-0 bg-surface-container-low">
<img class="w-full h-full object-cover" data-alt="A meticulously crafted dark wool mantle draped elegantly on a minimalist tailor's mannequin. The scene is lit by soft, directional studio lighting that highlights the rich texture and deep charcoal hues of the fabric. The background is a stark, clean cream-colored studio setting, emphasizing a modern luxury fashion aesthetic. The mood is sophisticated and timeless." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWLm3VZMwgcvl8iPNX7DiXObBkJkkT5y6aXFHHLX8eEDfgmJHlEIHcyQCOTH-7tcRriZtfzfTT-WancdAwnfakIJRHY__jQK2rIHVCqh6IvY9PDSRYNeeLsaEpUbCHpAXvf7MfhVD20CF0mJl0ZAEQU1BLd9SVPrRpa54csfumA___EXmwKKYtaScRJcuAK2-14u0j4TMLOeCAzzJb0mBNpo0e-MuOQwB9IswgXqAuDnhOoXz7ITERCivHIrAoAHFIjjdJ2khNfAyx"/>
</div>
<div class="flex flex-col justify-between flex-grow">
<div>
<h3 class="text-label-md font-label-md uppercase text-on-surface">Archival Wool Mantle</h3>
<p class="text-caption font-caption text-on-surface-variant mt-1">Color: Midnight</p>
<p class="text-caption font-caption text-on-surface-variant">Size: M</p>
</div>
<div class="flex justify-between items-end">
<span class="text-body-md font-body-md text-on-surface">Qty: 1</span>
<span class="text-headline-sm font-headline-sm text-primary">£850</span>
</div>
</div>
</div>
<div class="bg-surface-container p-4 rounded-xl space-y-3">
<div class="flex justify-between text-body-md font-body-md text-on-surface-variant">
<span>Subtotal</span>
<span>£850.00</span>
</div>
<div class="flex justify-between text-body-md font-body-md text-on-surface-variant">
<span>Shipping</span>
<span>Complimentary</span>
</div>
<div class="h-px bg-outline-variant w-full my-2"></div>
<div class="flex justify-between text-headline-sm font-headline-sm text-primary">
<span>Total</span>
<span>£850.00</span>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t border-outline-variant p-margin-mobile z-40 hidden" id="checkout-action">
<button class="w-full py-4 bg-primary text-on-primary rounded-full text-label-md font-label-md uppercase tracking-wider hover:bg-surface-tint transition-all btn-pulse flex justify-center items-center gap-2 shadow-lg">
            Complete Order <span class="material-symbols-outlined text-sm">lock</span>
</button>
</div>
<script>
        // Simple script to demonstrate flow (in a real app, this would be tied to form validation)
        document.addEventListener('DOMContentLoaded', () => {
            const shipBtn = document.querySelector('#step-shipping button');
            const shippingSec = document.getElementById('step-shipping');
            const paymentSec = document.getElementById('step-payment');
            const reviewSec = document.getElementById('step-review');
            const actionArea = document.getElementById('checkout-action');
            
            // Just for demonstration purposes to show all sections
            setTimeout(() => {
                shippingSec.style.display = 'block';
                paymentSec.style.display = 'block';
                reviewSec.style.display = 'block';
                
                setTimeout(() => {
                    paymentSec.classList.add('active');
                    reviewSec.classList.add('active');
                    actionArea.classList.remove('hidden');
                    
                    // Update progress indicators visually
                    const indicators = document.querySelectorAll('.flex-col.items-center .w-6');
                    indicators.forEach(ind => {
                        ind.className = 'w-6 h-6 rounded-full bg-primary text-on-primary flex items-center justify-center text-caption font-caption mb-1 shadow-sm';
                    });
                }, 100);
            }, 1000);
        });
    </script>
</body></html>
