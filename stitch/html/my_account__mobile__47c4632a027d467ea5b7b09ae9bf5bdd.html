<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Smooth scrolling and basic reset */
        html { scroll-behavior: smooth; }
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Slide in animation for mobile sections */
        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }

    body {

    }

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col md:hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-inverse-surface fixed top-0 w-full z-50 border-b border-outline-variant dark:border-outline">
<div class="flex justify-between items-center px-margin-mobile h-16 w-full">
<button aria-label="Menu" class="text-on-surface-variant dark:text-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-headline-md font-headline-md uppercase tracking-widest text-primary dark:text-primary-fixed-dim">GVSWIFT</h1>
<button aria-label="Shopping Bag" class="text-on-surface-variant dark:text-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-16 pb-24 px-margin-mobile flex flex-col gap-y-unit">
<!-- Page Header -->
<div class="py-8 slide-up stagger-1">
<h2 class="text-display-lg-mobile font-display-lg-mobile text-primary mb-2">My Account</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Manage your details and preferences.</p>
</div>
<!-- Horizontal Nav for Account Sections (Mobile optimized) -->
<nav aria-label="Account Navigation" class="flex overflow-x-auto no-scrollbar gap-4 pb-4 border-b border-outline-variant mb-6 slide-up stagger-2">
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-primary text-on-primary text-label-md font-label-md uppercase tracking-widest transition-colors flex items-center gap-2">
                Profile
            </button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:bg-surface-variant text-label-md font-label-md uppercase tracking-widest transition-colors flex items-center gap-2">
                Orders
            </button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:bg-surface-variant text-label-md font-label-md uppercase tracking-widest transition-colors flex items-center gap-2">
                Addresses
            </button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:bg-surface-variant text-label-md font-label-md uppercase tracking-widest transition-colors flex items-center gap-2">
                Settings
            </button>
</nav>
<!-- Personal Information Section -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant p-6 slide-up stagger-3 mb-8">
<div class="flex justify-between items-center mb-6">
<h3 class="text-headline-sm font-headline-sm text-primary">Personal Information</h3>
<button class="text-label-md font-label-md uppercase text-primary hover:text-surface-tint transition-colors tracking-widest">
                    Edit
                </button>
</div>
<form class="flex flex-col gap-y-6">
<div class="flex flex-col gap-y-2">
<label class="text-caption font-caption text-on-surface-variant uppercase tracking-wider" for="firstName">First Name</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-full px-6 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-default" id="firstName" readonly="" type="text" value="Eleanor"/>
</div>
<div class="flex flex-col gap-y-2">
<label class="text-caption font-caption text-on-surface-variant uppercase tracking-wider" for="lastName">Last Name</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-full px-6 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-default" id="lastName" readonly="" type="text" value="Vance"/>
</div>
<div class="flex flex-col gap-y-2">
<label class="text-caption font-caption text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-full px-6 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-default" id="email" readonly="" type="email" value="eleanor.vance@example.com"/>
</div>
<div class="flex flex-col gap-y-2">
<label class="text-caption font-caption text-on-surface-variant uppercase tracking-wider" for="phone">Phone Number</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-full px-6 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-default" id="phone" readonly="" type="tel" value="+1 (555) 019-2834"/>
</div>
</form>
</section>
<!-- Security Section -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant p-6 slide-up stagger-3">
<div class="flex justify-between items-center mb-6">
<h3 class="text-headline-sm font-headline-sm text-primary">Security</h3>
</div>
<div class="flex flex-col gap-y-4">
<div class="flex justify-between items-center py-4 border-b border-surface-variant">
<div class="flex flex-col gap-y-1">
<span class="text-body-md font-body-md text-on-surface">Password</span>
<span class="text-caption font-caption text-on-surface-variant">Last updated 3 months ago</span>
</div>
<button class="px-6 py-2 rounded-full border border-primary text-primary text-label-md font-label-md uppercase tracking-widest hover:bg-primary-fixed transition-colors active:scale-95">
                        Update
                    </button>
</div>
<div class="flex justify-between items-center py-4">
<div class="flex flex-col gap-y-1">
<span class="text-body-md font-body-md text-on-surface">Two-Factor Authentication</span>
<span class="text-caption font-caption text-on-surface-variant">Currently disabled</span>
</div>
<button class="px-6 py-2 rounded-full border border-primary text-primary text-label-md font-label-md uppercase tracking-widest hover:bg-primary-fixed transition-colors active:scale-95">
                        Enable
                    </button>
</div>
</div>
</section>
<!-- Logout Action -->
<div class="mt-8 mb-12 flex justify-center slide-up stagger-3">
<button class="text-label-md font-label-md uppercase tracking-widest text-on-surface-variant underline hover:text-primary transition-colors">
                Sign Out
            </button>
</div>
</main>
<script>
        // Simple script to handle 'Edit' toggle logic for demonstration
        document.addEventListener('DOMContentLoaded', () => {
            const editBtn = document.querySelector('button.text-label-md.text-primary.uppercase');
            const inputs = document.querySelectorAll('form input');
            
            let isEditing = false;
            
            if(editBtn) {
                editBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    isEditing = !isEditing;
                    
                    if(isEditing) {
                        editBtn.textContent = 'Save';
                        inputs.forEach(input => {
                            input.removeAttribute('readonly');
                            input.classList.remove('bg-surface-container-low', 'cursor-default');
                            input.classList.add('bg-surface', 'border-primary');
                        });
                        inputs[0].focus();
                    } else {
                        editBtn.textContent = 'Edit';
                        inputs.forEach(input => {
                            input.setAttribute('readonly', 'true');
                            input.classList.add('bg-surface-container-low', 'cursor-default');
                            input.classList.remove('bg-surface', 'border-primary');
                        });
                    }
                });
            }
        });
    </script>
</body></html>
